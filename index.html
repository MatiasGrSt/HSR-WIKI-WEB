<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - HSR Wiki</title>
    <link rel="stylesheet" href="css/basico.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
    <main id="main-scroll">

        <div id="content-layout">
            <!-- SECCIÓN SUPERIOR: Eventos y Sidebar -->
            <div class="hero-grid">
                <section class="section-events">
                    <h2 class="section-title">EVENTOS</h2>

                    <!-- Selector de Región -->
                    <div class="region-selector" id="region-selector">
                        <button class="region-btn" data-region="eu">Europa</button>
                        <button class="region-btn" data-region="am">América</button>
                        <button class="region-btn" data-region="as">Asia / TW</button>
                    </div>

                    <div class="events-columns">
                        <div class="events-column">
                            <h3 class="column-subtitle">Activos</h3>
                            <div id="events-active" class="events-column-list">
                                <!-- Aquí se inyectarán las .event-card con JS -->
                            </div>
                        </div>
                        <div class="events-column">
                            <h3 class="column-subtitle">Próximos y Anunciados</h3>
                            <div id="events-upcoming" class="events-column-list">
                                <!-- Aquí se inyectarán las .event-card con JS -->
                            </div>
                        </div>
                    </div>
                </section>

                <aside class="sidebar">
                    <section class="panel-codes glass-dark">
                        <h2 class="section-title">CÓDIGOS ACTIVOS</h2>
                        <div id="codes-list">
                            <!-- Aquí se inyectarán los .code-item con JS -->
                        </div>
                    </section>

                    <section class="panel-daily glass-dark">
                        <h2 class="section-title">RESET DIARIO</h2>
                        <div id="daily-countdown" class="timer-display">00h : 00m</div>
                    </section>
                </aside>
            </div>

            <!-- SECCIÓN PERSONAJES -->
            <section class="section-characters">
                <h2 class="section-title centered">PERSONAJES DESTACADOS</h2>
                <div id="characters-list">
                    <!-- Aquí se inyectarán los .char-card con JS -->
                </div>
            </section>
        </div>

        <footer class="main-footer">
            <p>&copy; 2026 HSR Wiki | Fan Project</p>
        </footer>
    </main>

    <script src="./js/nav.js"></script>
    <script type='module' src="./js/home.js"></script>
</body>
</html>
