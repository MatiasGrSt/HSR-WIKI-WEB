<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/general.css">
    <link rel="stylesheet" id="estilo" href="">
</head>
<!-- Cloudflare Web Analytics -->
<script defer src='https://static.cloudflareinsights.com/beacon.min.js'
    data-cf-beacon='{"token": "fcc1cfa50eb54cd6b251acfc91e1f9bb"}'>
    </script>
<!-- End Cloudflare Web Analytics -->

<body>
    <main>
        <div class="general">
            <img class="splash_art">
            <h1 id="name"></h1>

            <div class="element_path_rarity"></div>
            <div id="novaflare-switch-container"></div>

            <div class="info">
                <p id="introduction"></p>
                <div id="voice_actors">
                    <div>
                        <p>ENG</p>
                        <p id="eng"></p>
                    </div>

                    <div>
                        <p>JPN</p>
                        <p id="jpn"></p>
                    </div>

                    <div>
                        <p>CHN</p>
                        <p id="chn"></p>
                    </div>

                    <div>
                        <p>KOR</p>
                        <p id="kor"></p>
                    </div>
                </div>
            </div>

            <div class="botones">
                <img src="../imagenes/Utilities/Info.webp" id="info">
                <img src="../imagenes/Utilities/Abilities.webp" id="habilidades">
                <img src="../imagenes/Utilities/Eidolons.webp" id="eidolones">
                <img src="../imagenes/Utilities/Guide.webp" id="guide">
            </div>

            <div class="habilidades">
                <div class="modal-overlay-skill" style="display:none;">
                    <div class="modal-content-skill">
                        <span class="modal-close-skill">&times;</span>
                        <div class="modal-header-container">
                            <button id="modal-prev-skill" class="modal-arrow" style="display:none;">&#10094;</button>
                            <div class="modal-header-skill">
                                <div class="modal-img-wrapper"><img id="modal-img-skill" src="" alt="Icono"></div>
                                <div class="modal-title-box">
                                    <div class="modal-name-row">
                                        <h2 id="modal-name-skill">Nombre</h2>
                                        <span id="novaflare-tag" class="novaflare-badge"
                                            style="display:none;">Novaflare</span>
                                    </div>
                                    <p id="modal-type-target-skill" class="type"></p>
                                </div>
                            </div>
                            <button id="modal-next-skill" class="modal-arrow" style="display:none;">&#10095;</button>
                        </div>
                        <div id="modal-tabs-container" class="modal-tabs-container" style="display:none;"></div>
                        <div class="level-selector-cont" id="level-selector-box">
                            <label>Nivel: <span id="lvl-display">1</span></label>
                            <input type="range" id="skill-lvl-range" min="1" max="15" value="1">
                        </div>
                        <div class="modal-stats-skill" id="modal-stats-skill"></div>
                        <hr class="modal-divider">
                        <div class="modal-description-skill" id="modal-desc-skill"></div>
                    </div>
                </div>
                <div id="hab_cont"></div>
            </div>

            <div class="eidolones" id="eidolones-container"></div>
        </div>
    </main>

    <script type="module" src="../js/info_pj.js"></script>
    <script src="../js/nav.js"></script>
</body>

</html>
