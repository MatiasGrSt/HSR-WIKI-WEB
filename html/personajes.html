<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personajes - HSR Wiki</title>
    <link rel="stylesheet" href="../css/basico.css">
    <link rel="stylesheet" href="../css/personajes.css">
</head>
<!-- Cloudflare Web Analytics -->
 <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "fcc1cfa50eb54cd6b251acfc91e1f9bb"}'>
</script>
<!-- End Cloudflare Web Analytics -->
<body>
    <main id="main-scroll">
        <div id="content-layout">
            <h2 class="section-title">PERSONAJES</h2> 
            
            <section class="panel-filters glass-dark">
                <form>
                    <div class="buscador-rarezas">
                        <input type="text" class="nombre" placeholder="Buscar personaje...">
                        <div class="rareza">
                            <input type="checkbox" id="all-rarity" name="all-rarity" value="todos" style="background-image: url(../imagenes/Utilities/Todos.svg); --c: #ffffff;" checked>
                            <input type="checkbox" id="five-estrellas" name="cinco-estrellas" value="5 Estrellas" style="background-image: url(../imagenes/Utilities/5.webp); --c: #d29640;">
                            <input type="checkbox" id="four-estrellas" name="cuatro-estrellas" value="4 Estrellas" style="background-image: url(../imagenes/Utilities/4.webp); --c: #a359ff;">
                        </div>
                    </div>
                    <div class="elemento">
                        <input type="checkbox" id="all-elements" name="all-elements" value="Todos Elementos" style="background-image: url(../imagenes/Utilities/Todos.svg); --c: #ffffff;" checked>
                        <input type="checkbox" id="fisico" name="Físico" value="fisico" style="background-image: url(../imagenes/personajes/Tipos/Físico.webp); --c: #acabab;">
                        <input type="checkbox" id="fuego" name="Fuego" value="fuego" style="background-image: url(../imagenes/personajes/Tipos/Fuego.webp); --c: #f04644;">
                        <input type="checkbox" id="hielo" name="Hielo" value="hielo" style="background-image: url(../imagenes/personajes/Tipos/Hielo.webp); --c: #1fb6d1;">
                        <input type="checkbox" id="rayo" name="Rayo" value="rayo" style="background-image: url(../imagenes/personajes/Tipos/Rayo.webp); --c: #cc5ce3;">
                        <input type="checkbox" id="viento" name="Viento" value="viento" style="background-image: url(../imagenes/personajes/Tipos/Viento.webp); --c: #3bbd86;">
                        <input type="checkbox" id="cuantico" name="Cuántico" value="cuantico" style="background-image: url(../imagenes/personajes/Tipos/Cuántico.webp); --c: #8c80ff;">
                        <input type="checkbox" id="imaginario" name="Imaginario" value="imaginario" style="background-image: url(../imagenes/personajes/Tipos/Imaginario.webp); --c: #d6c146;">
                    </div>
                    <div class="via">
                        <input type="checkbox" id="all-paths" name="all-paths" value="Todas Vias" style="background-image: url(../imagenes/Utilities/Todos.svg); --c: #ffffff;" checked>
                        <input type="checkbox" id="abundancia" name="Abundancia" value="abundancia" style="background-image: url(../imagenes/personajes/Vias/Abundancia.webp); --c: rgb(159, 189, 104);">
                        <input type="checkbox" id="destruccion" name="Destrucción" value="destruccion" style="background-image: url(../imagenes/personajes/Vias/Destrucción.webp); --c: rgb(95, 0, 0);">
                        <input type="checkbox" id="erudicion" name="Erudición" value="erudicion" style="background-image: url(../imagenes/personajes/Vias/Erudición.webp); --c: rgb(183, 0, 58);">
                        <input type="checkbox" id="armonia" name="Armonía" value="armonia" style="background-image: url(../imagenes/personajes/Vias/Armonía.webp); --c: rgb(255, 77, 160);">
                        <input type="checkbox" id="caceria" name="Cacería" value="caceria" style="background-image: url(../imagenes/personajes/Vias/Cacería.webp); --c: rgb(88, 124, 221);">
                        <input type="checkbox" id="nihilidad" name="Nihilidad" value="nihilidad" style="background-image: url(../imagenes/personajes/Vias/Nihilidad.webp); --c: rgb(72, 34, 168);">
                        <input type="checkbox" id="conservacion" name="Conservación" value="conservacion" style="background-image: url(../imagenes/personajes/Vias/Conservación.webp); --c: rgb(112, 66, 36);">
                        <input type="checkbox" id="reminiscencia" name="Reminiscencia" value="reminiscencia" style="background-image: url(../imagenes/personajes/Vias/Reminiscencia.webp); --c: rgb(175, 231, 255);">
                        <input type="checkbox" id="exultacion" name="Exultación" value="exultacion" style="background-image: url(../imagenes/personajes/Vias/Exultación.webp); --c: rgb(255, 54, 54);">
                    </div>
                </form>
            </section>

            <ul class="lista-personajes"></ul>
        </div>
        
        <footer class="main-footer">
            <p>&copy; 2026 HSR Wiki | Fan Project</p>
        </footer>
    </main>

    <script type="module" src="../js/buscador.js"></script>
    <script type="module" src="../js/personajes.js"></script>
    <script type="module" src="../js/ordenar.js"></script>
    <script src="../js/nav.js"></script>
</body>
</html>
